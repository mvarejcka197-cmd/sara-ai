<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sára 🌸</title>
    <style>
        :root { --main-color: #ffafcc; --bg-color: #0f0f0f; }
        body { background: var(--bg-color); color: var(--main-color); font-family: sans-serif; text-align: center; padding: 20px; transition: 0.5s; }
        #chat { background: rgba(255,255,255,0.05); border-radius: 20px; height: 350px; overflow-y: auto; padding: 15px; margin: 15px auto; max-width: 500px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; text-align: left; }
        .user { background: #333; align-self: flex-end; color: white; }
        .sara { background: var(--main-color); align-self: flex-start; color: black; font-weight: 500; }
        .controls { display: flex; gap: 10px; max-width: 500px; margin: 0 auto; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #222; color: white; outline: none; }
        button { background: var(--main-color); border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; color: black; }
    </style>
</head>
<body>
    <h2>Sára 🌸</h2>
    <div id="chat"><div class="msg sara">Ahoj! Zadej svůj API klíč, abychom si mohli psát. 😊</div></div>
    <div class="controls">
        <input type="text" id="userInput" placeholder="Napiš zprávu nebo vlož klíč..." onkeypress="if(event.key==='Enter') askAI()">
        <button onclick="askAI()">Poslat</button>
    </div>

    <script>
        let apiKey = localStorage.getItem('sara_key') || "";
        let history = [];

        async function askAI() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // Pokud klíč nemáme, uložíme ho z prvního vstupu
            if (!apiKey) {
                apiKey = text;
                localStorage.setItem('sara_key', text);
                input.value = "";
                document.getElementById('chat').innerHTML += `<div class="msg sara">Klíč uložen! Teď mi můžeš napsat cokoli. ✨</div>`;
                return;
            }

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            history.push({ role: "user", parts: });

            try {
                const response = await fetch("https://googleapis.com" + apiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: history })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;

                history.push({ role: "model", parts: });
                chat.innerHTML += `<div class="msg sara">${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (err) {
                chat.innerHTML += `<div style="color:red; font-size:10px;">Chyba: Zkontroluj klíč! Možná ho Google smazal.</div>`;
            }
        }
    </script>
</body>
</html>
