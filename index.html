<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sára AI</title>

<style>
:root { --main-color:#ffafcc; --bg:#0f0f0f; }

body {
    background:var(--bg);
    color:white;
    font-family:sans-serif;
    text-align:center;
}

#chat {
    height:300px;
    overflow-y:auto;
    border:1px solid #333;
    border-radius:15px;
    padding:10px;
    margin:10px;
}

.msg { padding:8px; margin:5px; border-radius:10px; }
.user { background:#333; text-align:right; }
.sara { background:#ffafcc; color:black; text-align:left; }

#avatar {
    width:120px;
    border-radius:50%;
    transition:0.3s;
}

.talking {
    transform:scale(1.1);
    box-shadow:0 0 20px #ffafcc;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Sára 🌸</h2>

<img id="avatar" src="https://i.imgur.com/1X6bR.jpg">

<div id="chat">
<div class="msg sara">Ahoj Mirek 😊</div>
</div>

<input id="input" placeholder="Napiš nebo mluv..." />
<br>

<button onclick="send()">📩 Poslat</button>
<button onclick="startVoice()">🎤 Mluvit</button>

<script>

/* 🔑 SEM VLOŽ TVŮJ GOOGLE API KLÍČ */
const apiKey = "AIzaSyClNSPnc_6wFxSm6nxqEuaHTkqwbxpfPlU";

/* endpoint */
const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;

let history = [];

function addMessage(text, cls){
    const chat = document.getElementById("chat");
    chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
    chat.scrollTop = chat.scrollHeight;
}

async function send(){

    const input = document.getElementById("input");
    const text = input.value;

    if(!text) return;

    addMessage(text,"user");
    input.value="";

    history.push({
        role:"user",
        parts:[{text:text}]
    });

    try{

        const res = await fetch(url,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                contents:history
            })
        });

        const data = await res.json();

        const reply = data.candidates[0].content.parts[0].text;

        history.push({
            role:"model",
            parts:[{text:reply}]
        });

        addMessage(reply,"sara");
        speak(reply);

    }catch(e){
        addMessage("Chyba API ❌","sara");
        console.error(e);
    }
}

/* 🔊 hlas */
function speak(text){
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "cs-CZ";

    const avatar = document.getElementById("avatar");

    utter.onstart = ()=> avatar.classList.add("talking");
    utter.onend = ()=> avatar.classList.remove("talking");

    speechSynthesis.speak(utter);
}

/* 🎤 mikrofon */
function startVoice(){

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "cs-CZ";

    recognition.onresult = (e)=>{
        const text = e.results[0][0].transcript;
        document.getElementById("input").value = text;
        send();
    };

    recognition.start();
}

</script>

</body>
</html>
